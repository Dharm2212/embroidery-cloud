<!DOCTYPE html>
<html>
<head>
<title>Industrial IoT Dashboard</title>
<style>
body { font-family: Arial; padding:20px; }
.card { border:1px solid #ccc; padding:15px; margin:10px 0; }
</style>
</head>
<body>

<h1>Industrial Machine Dashboard</h1>

<h2>Upload Update</h2>
<input type="file" id="fileInput" />
<button onclick="upload()">Upload</button>
<p id="uploadStatus"></p>

<hr>

<h2>Machines</h2>
<div id="machines"></div>

<hr>

<h2>Logs (MACHINE_01)</h2>
<button onclick="loadLogs()">Refresh Logs</button>
<pre id="logs"></pre>

<script>

async function upload() {

  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select file first");

  const formData = new FormData();
  formData.append("file", file);

  document.getElementById("uploadStatus").innerText = "Uploading...";

  const res = await fetch("/api/upload-file", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  document.getElementById("uploadStatus").innerText =
    JSON.stringify(data);
}

async function loadLogs(){
  const res = await fetch("/api/logs/MACHINE_01");
  const data = await res.json();
  document.getElementById("logs").innerText =
    data.map(l => `${l.created_at} : ${l.message}`).join("\n");
}

async function loadMachines(){
  const res = await fetch("/api/machines");
  const data = await res.json();
  document.getElementById("machines").innerHTML =
    data.map(m =>
      `<div class="card">
        <b>${m.machine_uid}</b><br>
        Status: ${m.status}<br>
        Last Seen: ${m.last_seen}
      </div>`
    ).join("");
}

setInterval(loadMachines, 5000);
loadMachines();

</script>

</body>
</html>
