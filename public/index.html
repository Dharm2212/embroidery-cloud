<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Industrial IoT Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding:20px; background: #f4f7f6; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; border-radius: 8px; padding:15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .machine-card { border-left: 5px solid #007bff; cursor: pointer; }
        .machine-card:hover { background: #e9ecef; }
        pre { background: #222; color: #0f0; padding: 10px; border-radius: 5px; height: 300px; overflow-y: auto; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

    <h1>Industrial Control Center</h1>

    <div class="grid">
        <section>
            <div class="card">
                <h2>Firmware Update</h2>
                <input type="file" id="fileInput" />
                <button id="upBtn" onclick="upload()">Push Update to Machines</button>
                <p id="uploadStatus"></p>
            </div>

            <h2>Active Machines</h2>
            <div id="machines"></div>
        </section>

        <section>
            <div class="card">
                <h2>Live Logs: <span id="currentMachine">None</span></h2>
                <button onclick="loadLogs()">Manual Refresh</button>
                <pre id="logs">Select a machine to view logs...</pre>
            </div>
        </section>
    </div>

    <script>
        let selectedMachine = "MACHINE_01";

        async function upload() {
  const fileInput = document.getElementById("fileInput");
  const status = document.getElementById("uploadStatus");
  
  if (!fileInput.files[0]) return alert("Please select a file.");

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  status.innerText = "Processing...";

  try {
    const res = await fetch("/api/upload-file", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (res.ok) {
      // Success: data.version will now be defined
      status.style.color = "green";
      status.innerText = `🚀 Success! Deployment Version: ${data.version}`;
    } else {
      // Server returned an error (e.g., 400 or 500)
      status.style.color = "red";
      status.innerText = `❌ Error: ${data.error || 'Unknown error'}`;
    }
  } catch (err) {
    // Network or parsing error
    status.style.color = "red";
    status.innerText = "❌ Network error. Check server console.";
  }
}

        async function loadMachines() {
            const res = await fetch("/api/machines");
            const data = await res.json();
            document.getElementById("machines").innerHTML = data.map(m => `
                <div class="card machine-card" onclick="setMachine('${m.machine_uid}')">
                    <strong>ID: ${m.machine_uid}</strong><br>
                    Status: <span style="color:${m.status === 'ONLINE' ? 'green' : 'red'}">${m.status}</span><br>
                    <small>Last Seen: ${new Date(m.last_seen).toLocaleString()}</small>
                </div>
            `).join("");
        }

        function setMachine(id) {
            selectedMachine = id;
            document.getElementById("currentMachine").innerText = id;
            loadLogs();
        }

        async function loadLogs() {
            if (!selectedMachine) return;
            const res = await fetch(`/api/logs/${selectedMachine}`);
            const data = await res.json();
            document.getElementById("logs").innerText = data.length 
                ? data.map(l => `[${new Date(l.created_at).toLocaleTimeString()}] ${l.message}`).join("\n")
                : "No logs found for this machine.";
        }

        // Intervals
        setInterval(loadMachines, 5000);
        setInterval(loadLogs, 3000);
        loadMachines();
    </script>
</body>
</html>
